name: Dependabot auto-merge

# Auto-merge low-risk Dependabot PRs: security advisories (CVE/GHSA) and the
# routine grouped version updates (gem-updates = minor/patch gems,
# action-updates = GitHub Actions). Major gem bumps are ungrouped and left for
# manual review. Everything still waits on the required CI checks on `main`
# (enforced by branch protection) before merging.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

      - name: Enable auto-merge
        # ghsa-id is set on single-advisory PRs; grouped updates (see
        # dependabot.yml) surface via dependency-group. Majors are ungrouped,
        # so they fall through to manual review.
        if: >-
          steps.meta.outputs.ghsa-id != '' ||
          steps.meta.outputs.dependency-group == 'security' ||
          steps.meta.outputs.dependency-group == 'gem-updates' ||
          steps.meta.outputs.dependency-group == 'action-updates'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
