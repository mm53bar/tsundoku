name: Dependabot auto-merge

# Auto-merge Dependabot PRs that fix a security advisory (CVE/GHSA).
# Plain version-bump PRs are left open for manual review; only updates
# carrying a security advisory are merged automatically, and only after
# the required CI checks on `main` pass (enforced by branch protection).

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2

      - name: Enable auto-merge for security updates
        if: steps.meta.outputs.ghsa-id != ''
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
