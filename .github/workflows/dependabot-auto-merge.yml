name: Dependabot auto-merge

# Auto-merge Dependabot PRs that fix a security advisory (CVE/GHSA).
# Plain version-bump PRs are left open for manual review; only updates
# carrying a security advisory are merged automatically, and only after
# the required CI checks on `main` pass (enforced by branch protection).

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2

      - name: Enable auto-merge for security updates
        # ghsa-id is set on single-advisory PRs; grouped security fixes
        # (see dependabot.yml) surface as the "security" dependency-group.
        if: steps.meta.outputs.ghsa-id != '' || steps.meta.outputs.dependency-group == 'security'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
