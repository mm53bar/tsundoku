# Tsundoku — Docker Compose
#
# Authentication: the app trusts Remote-User / Remote-Email / Remote-Name headers
# injected by the upstream proxy (nginx-proxy-manager + Authelia forward-auth).
# It MUST be reached only via the proxy. Do not expose port directly to clients.

x-tsundoku-common: &tsundoku-common
  # Image is built by .github/workflows/build.yml on every push to main.
  # Pin to a specific :sha tag if you want to lock to a known build instead
  # of following main.
  image: ghcr.io/mm53bar/tsundoku:latest
  # The image is host-agnostic; set the runtime UID/GID here to match the
  # owner of LIBRARY_DIR / INGEST_DIR / CONFIG_DIR on the host (Synology
  # shared folders are typically 1027:100).
  user: "${UID:-1000}:${GID:-1000}"
  restart: unless-stopped
  pull_policy: always
  volumes:
    - ${LIBRARY_DIR:?LIBRARY_DIR must be set}:/library:rw
    - ${INGEST_DIR:?INGEST_DIR must be set}:/ingest:rw
    - ${CONFIG_DIR:?CONFIG_DIR must be set}:/rails/storage:rw
    # Point CWA_CONFIG_DIR at your existing CWA config directory (the one
    # CWA itself uses at /config) to let the `kobo:import_sync_state_from_cwa`
    # rake task auto-discover app.db. If unset, the repo's empty/ directory
    # is mounted instead — harmless, the rake task will just error out with
    # "CWA db not found" if invoked.
    - ${CWA_CONFIG_DIR:-./empty}:/cwa-config:ro
  environment: &tsundoku-env
    TZ: ${TZ:-UTC}
    LIBRARY_PATH: /library
    INGEST_PATH: /ingest
    APP_URL: ${APP_URL:?APP_URL must be set, e.g. https://tsundoku.example.com}
    AUTHELIA_LOGOUT_URL: ${AUTHELIA_LOGOUT_URL:-}
    RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:?RAILS_MASTER_KEY must be set}
    RAILS_LOG_TO_STDOUT: "1"
    # Phase 2 metadata enrichment. Optional — unset means Hardcover lookups are skipped.
    HARDCOVER_APP_API_TOKEN: ${HARDCOVER_APP_API_TOKEN:-}

services:
  tsundoku:
    <<: *tsundoku-common
    ports:
      - "${HOST_PORT:-3000}:8080"
    environment:
      <<: *tsundoku-env
      # Thruster listens here. Container runs as non-root, so it can't bind :80.
      HTTP_PORT: "8080"

  worker:
    <<: *tsundoku-common
    # Runs background jobs (Calibre import, Phase 2 metadata enrichment) via
    # Solid Queue. Same image, no web server, no port.
    command: [ "bundle", "exec", "rake", "solid_queue:start" ]
    depends_on:
      - tsundoku
