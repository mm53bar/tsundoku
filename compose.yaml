# Tsundoku — Docker Compose template.
#
# Tsundoku trusts Remote-User / Remote-Email / Remote-Name headers from an
# upstream auth proxy (e.g. nginx-proxy-manager + Authelia forward-auth) and
# MUST be reached only through it — never expose the port directly to clients.
#
# This is a template: copy it into your stack (Portainer/Arcane or plain
# `docker compose`) and edit the volume paths, the `user:` UID:GID, and
# SECRET_KEY_BASE for your host. Background jobs run inside the web container
# (Solid Queue in Puma), so there's a single service — no separate worker.

services:
  tsundoku:
    image: ghcr.io/mm53bar/tsundoku:latest   # pin to :<short-sha> to lock a build
    user: "1000:1000"                          # UID:GID that owns the dirs below (Synology: often 1027:100)
    restart: unless-stopped
    pull_policy: always
    ports:
      - "3000:8080"                            # host:container — the container port is fixed at 8080
    volumes:
      - /path/to/library:/library:rw           # your Calibre / ebook library
      - /path/to/ingest:/ingest:rw             # drop-folder watched for new EPUBs
      - /path/to/config:/rails/storage:rw      # SQLite DBs + caches — must persist
      # Optional, only for migrating from Calibre-Web-Automated:
      # - /path/to/cwa-config:/cwa-config:ro
    environment:
      # Required. Generate once with: openssl rand -hex 64
      SECRET_KEY_BASE: "replace-with-64-byte-hex"
      # Optional — set to enable Hardcover metadata enrichment:
      # HARDCOVER_APP_API_TOKEN: "your-hardcover-jwt"
      # Optional (defaults shown):
      # TZ: "UTC"
      # AUTHELIA_LOGOUT_URL: "https://auth.example.com/logout"   # where "Sign out" redirects
      # SHELFMARK_URL: "https://shelfmark.example.com"           # enables "Find via Shelfmark" links

# Prefer to keep secrets out of this file? Set SECRET_KEY_BASE /
# HARDCOVER_APP_API_TOKEN via Docker secrets, or mount a directory at
# /rails/config/secrets containing your own master.key + credentials.yml.enc
# (the app auto-detects it and reads the Hardcover token from credentials).
